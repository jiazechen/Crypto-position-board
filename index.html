<!DOCTYPE html>
<html>
<head>
    <title>持仓管理</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg: #f0eee6;          /* 暖米白 */
            --surface: #faf9f5;     /* 卡片米白 */
            --surface-2: #f5f3eb;   /* 较深米 */
            --surface-3: #ece9dd;   /* 更深米（hover/输入） */
            --border: #d9d4c7;      /* 米色细边框 */
            --border-strong: #b8b1a0;
            --text: #1a1a18;        /* 近黑（暖调） */
            --text-2: #5d5b56;      /* 灰褐 */
            --text-3: #8a877f;      /* 浅灰褐 */
            --accent: #c1633e;      /* 赤陶橙 */
            --accent-hover: #a8542e;
            --accent-bg: #ede0d6;
            --success: #5a7d4f;     /* 沉稳绿（橄榄） */
            --success-bg: #e6eadd;
            --danger: #b04a3f;      /* 赤土红 */
            --danger-bg: #ecdcd5;
        }

        html, body { min-height: 100%; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei UI', 'Microsoft YaHei',
                         'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Serif for stat numbers (印刷品质感) — 英文衬线 + 中文圆润黑体 */
        .stats-value, .stats-value-cny {
            font-family: 'Source Serif 4', 'Iowan Old Style', Georgia,
                         'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei UI', 'Microsoft YaHei',
                         serif;
            font-feature-settings: 'tnum' on, 'lnum' on;
        }
        /* Card titles — 英文衬线 + 中文圆润黑体 */
        .card-header, .modal-title {
            font-family: 'Source Serif 4', 'Iowan Old Style', Georgia,
                         'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei UI', 'Microsoft YaHei',
                         serif;
        }

        /* ── Language switch ── */
        .language-switch {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 1000;
            padding: 5px 12px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-2);
            box-shadow: none;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .language-switch:hover {
            transform: none;
            background: var(--surface-2);
            color: var(--text);
            border-color: var(--border-strong);
            box-shadow: none;
        }

        /* ── Stats cards ── */
        .stats-card {
            background: var(--surface);
            border-radius: 8px;
            padding: 20px 22px;
            margin-bottom: 0;
            border: 1px solid var(--border);
            box-shadow: none;
            transition: border-color 0.15s, background 0.15s;
            height: 100%;
            position: relative;
        }
        .stats-card:hover {
            transform: none;
            border-color: var(--border-strong);
        }
        .stats-value {
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.015em;
            line-height: 1.15;
        }
        .stats-value-cny {
            font-size: 0.9rem;
            color: var(--text-3);
            margin-top: 4px;
            font-weight: 400;
            font-style: italic;
        }
        #totalValue { font-size: 1.85rem; }
        .stats-label {
            color: var(--text-3);
            font-size: 0.7rem;
            font-weight: 500;
            margin-top: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* USD entry card */
        a.text-decoration-none { display: block; height: 100%; }
        a .stats-card {
            background: var(--surface);
            border-color: var(--border);
            border-left: 3px solid var(--accent);
            padding-left: 19px;
        }
        a:hover .stats-card {
            background: var(--surface-2);
            border-color: var(--border-strong);
            border-left-color: var(--accent);
        }
        a .stats-card .stats-value {
            font-family: 'Source Serif 4', serif !important;
            font-size: 1.15rem !important;
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }
        a .stats-card .stats-value i {
            font-size: 1.25rem;
            color: var(--accent);
        }
        a .stats-card .stats-label {
            color: var(--text-3);
        }
        a .stats-card .external-arrow {
            position: absolute;
            top: 14px;
            right: 14px;
            font-size: 0.8rem;
            color: var(--text-3);
            transition: color 0.15s, transform 0.15s;
        }
        a:hover .stats-card .external-arrow {
            color: var(--accent);
            transform: translate(2px, -2px);
        }

        /* ── Page title ── */
        .page-title {
            font-family: 'Source Serif 4', 'Iowan Old Style', Georgia,
                         'PingFang SC', 'Hiragino Sans GB',
                         'Microsoft YaHei UI', 'Microsoft YaHei', serif;
            font-size: 1.95rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.02em;
            text-align: center;
            margin: 18px 0 40px;
            line-height: 1.2;
        }
        .page-title .title-accent {
            color: var(--accent);
        }

        /* Toggle visibility */
        #toggleVisibilityBtn {
            color: var(--text-3);
            padding: 4px 8px;
            border-radius: 4px;
            line-height: 1;
            border: none;
        }
        #toggleVisibilityBtn:hover {
            color: var(--text);
            background: var(--surface-3);
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: none;
            overflow: hidden;
        }
        .card-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            border-radius: 0 !important;
            padding: 16px 22px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .card-body {
            padding: 22px;
            background: var(--surface);
            color: var(--text);
        }

        /* ── Form ── */
        .form-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-2);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .form-control {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 0.9rem;
            color: var(--text);
            background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control::placeholder { color: var(--text-3); }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(193,99,62,0.12);
            background: var(--surface);
            color: var(--text);
            outline: none;
        }
        .form-control:disabled {
            background: var(--surface-2);
            color: var(--text-2);
            border-color: var(--border);
        }
        #submitBtn, .btn-primary {
            background: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 9px 22px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #faf9f5;
            box-shadow: none;
            transition: background 0.15s, border-color 0.15s;
        }
        #submitBtn:hover, .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: none;
            transform: none;
            color: #faf9f5;
        }
        #submitBtn:disabled, .btn-primary:disabled {
            background: var(--surface-3);
            border-color: var(--border);
            color: var(--text-3);
            box-shadow: none;
            transform: none;
            opacity: 1;
        }
        .input-group .form-control { border-radius: 6px 0 0 6px; }
        .input-group .btn-outline-secondary {
            border-radius: 0 6px 6px 0;
            font-size: 0.82rem;
            font-weight: 500;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: none;
            color: var(--text-2);
        }
        .input-group .btn-outline-secondary:hover {
            background: var(--surface-3);
            color: var(--text);
            border-color: var(--border-strong);
        }

        /* ── Table ── */
        .table {
            font-size: 0.88rem;
            margin-bottom: 0;
            color: var(--text);
        }
        .table thead th {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding: 10px 14px;
            background: transparent;
        }
        .table tbody td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            border-top: 0;
            vertical-align: middle;
            color: var(--text);
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.82rem;
            font-weight: 500;
            background: transparent;
            font-feature-settings: 'tnum' on, 'lnum' on;
        }
        .table tbody td:first-child {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text);
            font-size: 0.88rem;
        }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: transparent;
            box-shadow: none;
            color: var(--text);
        }
        .table > tbody > tr {
            transition: background 0.12s;
        }
        .table > tbody > tr:hover > td {
            background-color: var(--surface-2);
            color: var(--text);
        }
        .table tbody tr:last-child td { border-bottom: 0; }
        .table td:last-child {
            width: 92px;
            text-align: center;
            padding: 8px;
        }

        /* Price change — minimal Claude style with arrows */
        .change-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0;
        }
        .change-pill i {
            font-size: 0.85rem;
            line-height: 1;
        }
        .change-pill.up { color: var(--success); }
        .change-pill.down { color: var(--danger); }
        .change-pill.flat { color: var(--text-3); }

        /* ── Action buttons ── */
        .btn-outline-primary, .btn-outline-danger {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-3);
            margin: 0;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .btn-outline-primary:hover {
            background: var(--accent-bg);
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-outline-danger:hover {
            background: var(--danger-bg);
            border-color: var(--danger);
            color: var(--danger);
        }
        .btn-outline-primary:active { background: var(--accent-bg); color: var(--accent-hover); }
        .btn-outline-danger:active  { background: var(--danger-bg); color: var(--danger); }
        .btn-outline-primary:focus, .btn-outline-danger:focus { box-shadow: none; }
        .btn-outline-primary i, .btn-outline-danger i { font-size: 0.82rem; }
        .btn-group-sm {
            display: inline-flex;
            gap: 4px;
        }
        .btn-group-sm .btn {
            padding: 5px 8px;
            font-size: 0.82rem;
            line-height: 1;
            border-radius: 5px !important;
        }

        /* Export button — Claude-style outlined */
        .btn-success {
            background: transparent;
            border: 1px solid var(--border-strong);
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            padding: 5px 14px;
            color: var(--text-2);
            box-shadow: none;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .btn-success:hover {
            background: var(--text);
            border-color: var(--text);
            color: var(--surface);
            box-shadow: none;
            transform: none;
        }

        /* ── Price info ── */
        .token-input-group { position: relative; }
        .price-info {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            color: var(--text-2);
            white-space: nowrap;
            pointer-events: none;
            font-family: 'JetBrains Mono', monospace;
        }
        .loading { color: var(--text-3); font-style: italic; }
        .error, .error-text {
            color: var(--danger);
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .text-danger { color: var(--danger) !important; }
        .text-warning { color: #fbbf24 !important; }

        /* ── Chart ── */
        .pie-chart-container {
            height: 420px;
            margin-top: 0;
        }

        /* ── Modal ── */
        .modal-content {
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border-strong);
            box-shadow: 0 12px 40px rgba(26,26,24,0.12);
            color: var(--text);
        }
        .modal-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .modal-body  { padding: 22px 24px; }
        .modal-footer {
            padding: 14px 24px;
            border-top: 1px solid var(--border);
            gap: 8px;
        }
        .modal-footer .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text-2);
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 8px 18px;
        }
        .modal-footer .btn-secondary:hover {
            background: var(--surface-2);
            color: var(--text);
            border-color: var(--text-2);
        }
        .btn-close { transition: opacity 0.15s; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

        /* Selection */
        ::selection { background: var(--accent-bg); color: var(--text); }
    </style>
</head>
<body>
    <button class="btn btn-outline-primary language-switch" onclick="toggleLanguage()" id="languageBtn">
        CN
    </button>
    <div class="container mt-4">
        <h1 class="page-title">Crypto <span class="title-accent">Position</span> Board</h1>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stats-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stats-value" id="totalValue">$0.00</div>
                            <div class="stats-value-cny" id="totalValueCNY">¥0.00</div>
                        </div>
                        <button class="btn btn-link btn-sm p-0" onclick="toggleAmountVisibility()" id="toggleVisibilityBtn">
                            <i class="bi bi-eye-slash"></i>
                        </button>
                    </div>
                    <div class="stats-label">总持仓价值</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card">
                    <div class="stats-value" id="usdCnyRate">¥--</div>
                    <div class="stats-value-cny" id="usdCnyRateSub">1 USD</div>
                    <div class="stats-label">美元汇率</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stats-card">
                    <div class="stats-value" id="lastUpdate">--</div>
                    <div class="stats-label">数据更新时间</div>
                </div>
            </div>
            <div class="col-md-3">
                <a href="usd.html" class="text-decoration-none" target="_blank" id="usdLink">
                    <div class="stats-card" style="cursor: pointer;">
                        <i class="bi bi-arrow-up-right external-arrow"></i>
                        <div class="stats-value">
                            <i class="bi bi-currency-dollar"></i>
                            <span style="margin-left: 4px;" id="usdManagementText">USD 理财管理</span>
                        </div>
                        <div class="stats-label">点击进入</div>
                    </div>
                </a>
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        持仓分布图
                    </div>
                    <div class="card-body">
                        <div id="pieChart" class="pie-chart-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 pb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span>持仓列表</span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-primary btn-sm" id="openAddBtn" onclick="openAddPositionModal()">
                                <i class="bi bi-plus-lg"></i> <span id="openAddBtnText">添加</span>
                            </button>
                            <button class="btn btn-success btn-sm" onclick="exportToCSV()">
                                导出CSV
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Token</th>
                                    <th>数量</th>
                                    <th>价格</th>
                                    <th>总额</th>
                                    <th>占比</th>
                                    <th>涨跌幅</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="positionsList">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="addModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addModalTitle">添加持仓</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="positionForm">
                            <div class="mb-3">
                                <label class="form-label">Token</label>
                                <div class="token-input-group">
                                    <input type="text" name="token" class="form-control"
                                           placeholder="例如: BTC" required>
                                    <div id="priceInfo" class="price-info"></div>
                                </div>
                                <div id="tokenError" class="error-text"></div>
                                <div id="manualPriceInput" class="mt-2 d-none">
                                    <div class="input-group">
                                        <input type="number" step="any" class="form-control" id="manualPrice"
                                               placeholder="请输入价格">
                                        <button class="btn btn-outline-secondary" type="button" onclick="setManualPrice()">
                                            确认价格
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">数量</label>
                                <input type="number" step="any" name="amount" class="form-control" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" form="positionForm" class="btn btn-primary" id="submitBtn" disabled>新增</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="editModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="editModalTitle">加仓</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editForm">
                            <input type="hidden" id="editIndex">
                            <div class="mb-3">
                                <label class="form-label">Token</label>
                                <input type="text" id="editToken" class="form-control" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">当前价格</label>
                                <input type="text" id="editPrice" class="form-control" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" id="currentAmountLabel">当前数量</label>
                                <input type="text" id="currentAmountDisplay" class="form-control" disabled>
                            </div>
                            <div class="mb-3">
                                <label class="form-label" id="addAmountLabel">加仓数量</label>
                                <input type="number" step="any" id="editAmount" class="form-control" placeholder="本次新增的数量" required>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" onclick="saveEdit()">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let positions = [];
        const chart = echarts.init(document.getElementById('pieChart'));
        let currentPrice = 0;
        let priceUpdateTimer = null;
        let usdtCnyRate = 6.79; // 默认汇率

        // 语言配置

        // 修改 formatTokenSymbol 函数
        function formatTokenSymbol(symbol, exchange = 'binance') {
            symbol = symbol.trim().toUpperCase();
            // 如果已经包含 USDT，移除它以获得纯净的代币名称
            const pureSymbol = symbol.replace('USDT', '');
            
            switch (exchange.toLowerCase()) {
                case 'binance':
                    return pureSymbol + 'USDT';
                case 'bitget':
                    return pureSymbol + 'USDT';  // Bitget 使用大写，直接拼接
                case 'coingecko':
                    return pureSymbol.toLowerCase();
                default:
                    return pureSymbol + 'USDT';
            }
        }

        // 添加新的价格获取函数
        async function getBinancePrice(symbol) {
            try {
                const formattedSymbol = formatTokenSymbol(symbol);
                const response = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${formattedSymbol}`);
                const data = await response.json();
                
                if (data.code) {
                    throw new Error('Binance无效的交易对');
                }
                
                return {
                    price: parseFloat(data.lastPrice),
                    priceChange: parseFloat(data.priceChangePercent),
                    source: 'Binance'
                };
            } catch (error) {
                throw new Error('Binance获取价格失败');
            }
        }

        // 修改 getBitgetPrice 函数
        async function getBitgetPrice(symbol) {
            try {
                const formattedSymbol = formatTokenSymbol(symbol, 'bitget');
                console.log('Bitget formatted symbol:', formattedSymbol);
                
                const response = await fetch(`https://api.bitget.com/api/v2/spot/market/tickers?symbol=${formattedSymbol}`);
                const data = await response.json();
                console.log('Bitget response:', data);
                
                if (data.code !== '00000' || !data.data || !data.data[0]) {
                    throw new Error(`Bitget API 错误: ${data.msg || '无效的交易对'}`);
                }
                
                const tickerData = data.data[0];
                if (!tickerData.open || isNaN(parseFloat(tickerData.open))) {
                    throw new Error('Bitget返回的价格数据无效');
                }
                
                return {
                    price: parseFloat(tickerData.open),
                    priceChange: parseFloat(tickerData.change24h || 0) * 100, // 转换为百分比
                    source: 'Bitget'
                };
            } catch (error) {
                console.error('Bitget detailed error:', error);
                throw new Error(`Bitget获取价格失败: ${error.message}`);
            }
        }

        async function getCoingeckoPrice(symbol) {
            try {
                // 移除 USDT 后缀并转换为小写
                const tokenId = symbol.replace('USDT', '').toLowerCase();
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${tokenId}&vs_currencies=usd&include_24hr_change=true`);
                const data = await response.json();
                
                if (!data[tokenId]) {
                    throw new Error('Coingecko无效的交易对');
                }
                
                return {
                    price: data[tokenId].usd,
                    priceChange: data[tokenId].usd_24h_change || 0,
                    source: 'Coingecko'
                };
            } catch (error) {
                throw new Error('Coingecko获取价格失败');
            }
        }

        // 修改价格更新函数，实现多数据源依次尝试
        async function updatePriceInfo(symbol) {
            const priceInfo = document.getElementById('priceInfo');
            const tokenError = document.getElementById('tokenError');
            const submitBtn = document.getElementById('submitBtn');
            const manualPriceInput = document.getElementById('manualPriceInput');

            if (!symbol) {
                priceInfo.textContent = '';
                tokenError.textContent = '';
                submitBtn.disabled = true;
                manualPriceInput.classList.add('d-none');
                return;
            }

            const formattedSymbol = symbol.toUpperCase();
            priceInfo.textContent = `正在获取 ${formattedSymbol} 价格...`;
            priceInfo.className = 'price-info loading';
            tokenError.textContent = '';
            submitBtn.disabled = true;
            manualPriceInput.classList.add('d-none');

            try {
                let priceData;
                let errors = [];

                // 1. 尝试从 Binance 获取价格
                try {
                    priceData = await getBinancePrice(symbol);
                    console.log('Binance price success:', priceData);
                } catch (error) {
                    console.log('Binance error:', error.message);
                    errors.push(error.message);
                    
                    // 2. 尝试从 Bitget 获取价格
                    try {
                        priceData = await getBitgetPrice(symbol);
                        console.log('Bitget price success:', priceData);
                    } catch (error) {
                        console.log('Bitget error:', error.message);
                        errors.push(error.message);
                        
                        // 3. 尝试从 Coingecko 获取价格
                        try {
                            priceData = await getCoingeckoPrice(symbol);
                            console.log('Coingecko price success:', priceData);
                        } catch (error) {
                            console.log('Coingecko error:', error.message);
                            errors.push(error.message);
                        }
                    }
                }

                if (!priceData) {
                    throw new Error(`无法获取价格，所有数据源均失败:\n${errors.join('\n')}`);
                }

                currentPrice = priceData.price;
                priceInfo.textContent = `${formattedSymbol} (${priceData.source}): $${priceData.price.toFixed(8)}`;
                priceInfo.className = 'price-info';
                submitBtn.disabled = false;
                manualPriceInput.classList.add('d-none');
            } catch (error) {
                console.error('Final error:', error.message);
                priceInfo.textContent = '获取价格失败，请手动输入';
                priceInfo.className = 'price-info text-danger';
                tokenError.textContent = error.message;
                manualPriceInput.classList.remove('d-none');
                submitBtn.disabled = true;
            }
        }

        // 修改批量价格更新函数
        async function updateAllPrices() {
            try {
                for (let position of positions) {
                    try {
                        let priceData;
                        
                        // 依次尝试三个数据源
                        try {
                            priceData = await getBinancePrice(position.token);
                        } catch (error) {
                            try {
                                priceData = await getBitgetPrice(position.token);
                            } catch (error) {
                                try {
                                    priceData = await getCoingeckoPrice(position.token);
                                } catch (error) {
                                    console.error(`所有数据源都无法获取 ${position.token} 的价格`);
                                    continue;
                                }
                            }
                        }

                        if (priceData) {
                            position.price = priceData.price;
                            position.priceChange = priceData.priceChange;
                            position.total = position.amount * priceData.price;
                        }
                    } catch (error) {
                        console.error(`更新 ${position.token} 价格失败:`, error);
                    }
                }
                
                updateAll();
                saveToLocalStorage();
            } catch (error) {
                console.error('更新价格失败:', error);
            }
        }

            const addAmount = parseFloat(document.getElementById('editAmount').value);

            if (isNaN(addAmount) || addAmount <= 0) {
                alert(translations[currentLang]['pleaseInputValidAmount']);

            updateAll();
            saveToLocalStorage();

            editModal.hide();
        }

        // 更新所有显示
        function updateAll() {
            updateStats();
            updateTable();
            updateChart();
        }

        // 删除持仓
        function deletePosition(index) {
            positions.splice(index, 1);
            updateAll();
            saveToLocalStorage();
        }

        // 保存到本地存储
        function saveToLocalStorage() {
            localStorage.setItem('positions', JSON.stringify(positions));
        }

        // 从本地存储加载
        function loadFromLocalStorage() {
            // 加载持仓数据
            const saved = localStorage.getItem('positions');
            if (saved) {
                positions = JSON.parse(saved);
            }

            // 加载显示状态并更新界面
            isAmountVisible = localStorage.getItem('isAmountVisible') !== 'false';
            const btn = document.getElementById('toggleVisibilityBtn');
            btn.innerHTML = `<i class="bi bi-eye${isAmountVisible ? '-slash' : ''}"></i>`;
            
            // 加载语言设置
            currentLang = localStorage.getItem('language') || 'zh';
            document.getElementById('languageBtn').textContent = currentLang === 'zh' ? 'CN' : 'EN';
            updateLanguage();
            
            // 更新所有显示
            updateAll();
        }

        // 每60秒更新一次所有价格
        setInterval(updateAllPrices, 60000);

        // 页面加载时从本地存储加载数据并更新价格
        window.addEventListener('load', async function() {
            await getUsdtCnyRate(); // 获取初始汇率
            loadFromLocalStorage();
            if (positions.length > 0) {
                await updateAllPrices();
            }
        });

        // 保持原有的窗口大小调整处理
        window.addEventListener('resize', function() {
            chart.resize();
        });

        // 导出 CSV 函数
        function exportToCSV() {
            // 如果没有数据，提示用户
            if (positions.length === 0) {
                alert('没有可导出的数据');
                return;
            }

            // 获取当前日期
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).replace(/\//g, '');

            // 计算总价值
            const totalValue = positions.reduce((sum, pos) => sum + pos.total, 0);

            // 准备 CSV 数据
            const sortedPositions = [...positions].sort((a, b) => b.total - a.total);
            const csvContent = [
                // CSV 头部
                ['Token', '数量', '价格(USDT)', '总额(USDT)', '占比(%)', '涨跌幅(%)'],
                // 数据行
                ...sortedPositions.map(pos => [
                    pos.token.replace('USDT', ''),
                    pos.amount.toFixed(2),
                    pos.price.toFixed(2),
                    pos.total.toFixed(2),
                    ((pos.total / totalValue) * 100).toFixed(2),
                    (pos.priceChange || 0).toFixed(2)
                ]),
                // 空行
                [],
                // 汇总信息
                ['总计', '', '', totalValue.toFixed(2), '100.00', ''],
                ['导出时间', now.toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }).replace(/\//g, '-')]
            ];

            // 转换为 CSV 格式
            const csv = csvContent
                .map(row => row.map(cell => `"${cell}"`).join(','))
                .join('\n');

            // 创建 Blob 对象
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            
            // 创建下载链接
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `持仓快照-${dateStr}.csv`;
            
            // 触发下载
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 修改错消息相关函数
        function showError(message) {
            return translations[currentLang][message] || message;
        }

        // 获取 USD/CNY 汇率，24 小时 localStorage 缓存
        async function getUsdtCnyRate() {
            const CACHE_KEY = 'usdCnyRateCache';
            const TTL = 24 * 60 * 60 * 1000;

            // 读缓存
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { rate, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < TTL) {
                        usdtCnyRate = rate;
                        return;
                    }
                }
            } catch (_) {}

            // 主源：Frankfurter（欧洲央行）
            try {
                const res = await fetch('https://api.frankfurter.app/latest?base=USD&symbols=CNY');
                const data = await res.json();
                if (data.rates && data.rates.CNY) {
                    usdtCnyRate = data.rates.CNY;
                    localStorage.setItem(CACHE_KEY, JSON.stringify({ rate: usdtCnyRate, timestamp: Date.now() }));
                    return;
                }
            } catch (_) {}

            // 备用源：open.er-api.com
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                if (data.rates && data.rates.CNY) {
                    usdtCnyRate = data.rates.CNY;
                    localStorage.setItem(CACHE_KEY, JSON.stringify({ rate: usdtCnyRate, timestamp: Date.now() }));
                    return;
                }
            } catch (_) {}

            // 两个源都失败，尝试使用过期缓存
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { rate } = JSON.parse(cached);
                    usdtCnyRate = rate;
                    console.warn('USD/CNY 汇率使用过期缓存:', rate);
                    return;
                }
            } catch (_) {}

            // 最终兜底：保留默认值 6.79
            console.error('无法获取 USD/CNY 汇率，使用默认值 6.79');
        }

        // 每小时检查一次汇率（函数内部有缓存，不会频繁请求）
        setInterval(async function() {
            await getUsdtCnyRate();
            updateStats();
        }, 60 * 60 * 1000);

        // 修改 updateTable 函数
        function updateTable() {
            const tbody = document.getElementById('positionsList');
            const totalValue = positions.reduce((sum, pos) => sum + pos.total, 0);
            
            const sortedPositions = [...positions].sort((a, b) => b.total - a.total);
            
            tbody.innerHTML = sortedPositions.map((pos, index) => {
                const percentage = (pos.total / totalValue * 100).toFixed(2);
                const displayToken = pos.token.replace('USDT', '');
                
                // 格式化数量显示
                let formattedAmount;
                if (pos.amount >= 10) {
                    formattedAmount = Math.floor(pos.amount).toString();
                } else {
                    formattedAmount = pos.amount.toFixed(2);
                }
                
                // 格式化价格显示
                let formattedPrice;
                if (pos.price < 0.1) {
                    formattedPrice = pos.price.toFixed(5);
                } else if (pos.price >= 100) {
                    formattedPrice = Math.floor(pos.price).toString();
                } else {
                    formattedPrice = pos.price.toFixed(2);
                }
                
                // 格式化总额显示
                const formattedTotal = Math.floor(pos.total).toString();
                
                // 格式化涨跌幅显示
                const priceChangeValue = pos.priceChange || 0;
                const priceChangeAbs = Math.abs(priceChangeValue).toFixed(2);
                const pillClass = priceChangeValue > 0 ? 'up' : priceChangeValue < 0 ? 'down' : 'flat';
                const arrowIcon = priceChangeValue > 0
                    ? '<i class="bi bi-caret-up-fill"></i>'
                    : priceChangeValue < 0
                        ? '<i class="bi bi-caret-down-fill"></i>'
                        : '<i class="bi bi-dash"></i>';

                return `
                    <tr>
                        <td>${displayToken}</td>
                        <td>${isAmountVisible ? formattedAmount : '******'}</td>
                        <td>$${formattedPrice}</td>
                        <td>${isAmountVisible ? '$' + formattedTotal : '******'}</td>
                        <td>${percentage}%</td>
                        <td><span class="change-pill ${pillClass}">${arrowIcon} ${priceChangeAbs}%</span></td>
                        <td>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-primary btn-sm"
                                        onclick="editPosition(${positions.indexOf(pos)})"
                                        title="${translations[currentLang]['addMore']}">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                                <button class="btn btn-outline-danger btn-sm" 
                                        onclick="deletePosition(${positions.indexOf(pos)})"
                                        title="${translations[currentLang]['delete']}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
    </script>
